<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সাইন ইন - Admission Calendar</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div id="site-header"></div>

<div id="app">
  <div class="auth-wrap">
    <h1 class="page-title" style="text-align:center;">স্বাগতম 👋</h1>
    <p class="page-sub" style="text-align:center;">আপনার অ্যাকাউন্টে সাইন ইন করুন</p>

    <div class="card">
      <div class="form-msg" id="formMsg"></div>

      <button type="button" class="btn btn-google btn-block" id="googleBtn">
        <i class="fa-brands fa-google"></i> গুগল দিয়ে সাইন ইন করুন
      </button>
      <div class="divider-or">অথবা</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>ইমেইল</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">সাইন ইন করুন</button>
      </form>
    </div>

    <p class="auth-switch">অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্টার করুন</a></p>
  </div>
</div>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/auth.js"></script>
</body>
</html>
