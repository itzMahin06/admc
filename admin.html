<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>অ্যাডমিন প্যানেল - Admission Calendar</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .admin-tabs { display: flex; gap: 8px; margin: 22px 0 16px; flex-wrap: wrap; }
    .a-tab { padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-family: inherit; font-size: .82rem; font-weight: 700; cursor: pointer; }
    .a-tab.active { background: linear-gradient(135deg, var(--primary), #5b21b6); color: #fff; border-color: transparent; }
    .admin-section { display: none; }
    .admin-section.active { display: block; animation: fadeUp .4s both; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .toolbar input { max-width: 260px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: none; align-items: flex-start; justify-content: center; padding: 30px 14px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 24px; max-width: 560px; width: 100%; box-shadow: var(--shadow); animation: fadeUp .3s both; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-head h3 { font-family: 'Syne', sans-serif; font-size: 1.05rem; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
  </style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div id="site-header"></div>

<div id="app" class="wide">
  <div class="loading-block" id="adminLoading"><span class="spinner" style="border-top-color:var(--primary-hi);width:26px;height:26px;"></span><p style="margin-top:10px;">যাচাই করা হচ্ছে...</p></div>

  <div id="adminContent" style="display:none;">
    <h1 class="page-title"><i class="fa-solid fa-user-shield"></i> অ্যাডমিন প্যানেল</h1>
    <p class="page-sub">বিশ্ববিদ্যালয় ও ইউজার ম্যানেজ করুন</p>

    <div class="admin-tabs">
      <button class="a-tab active" data-target="unis">বিশ্ববিদ্যালয়সমূহ</button>
      <button class="a-tab" data-target="users">ইউজারসমূহ</button>
    </div>

    <!-- UNIVERSITIES -->
    <div class="admin-section active" id="asec-unis">
      <div class="toolbar">
        <input type="text" id="uniSearch" placeholder="নাম দিয়ে খুঁজুন...">
        <button class="btn btn-primary btn-sm" id="addUniBtn"><i class="fa-solid fa-plus"></i> নতুন বিশ্ববিদ্যালয়</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>নাম</th><th>ডেডলাইন</th><th>পরীক্ষার তারিখ</th><th>প্রয়োজনীয় জিপিএ</th><th>স্ট্যাটাস</th><th>অ্যাকশন</th></tr></thead>
          <tbody id="uniTableBody"><tr class="skeleton-row"><td colspan="6"></td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- USERS -->
    <div class="admin-section" id="asec-users">
      <div class="toolbar">
        <input type="text" id="userSearch" placeholder="নাম, ইউজারনেম বা ইমেইল দিয়ে খুঁজুন...">
        <button class="btn btn-primary btn-sm" id="addUserBtn"><i class="fa-solid fa-plus"></i> প্রোফাইল যোগ করুন</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>নাম</th><th>ইমেইল</th><th>SSC/HSC জিপিএ</th><th>বুকমার্ক</th><th>রোল</th><th>অ্যাকশন</th></tr></thead>
          <tbody id="userTableBody"><tr class="skeleton-row"><td colspan="6"></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<!-- UNIVERSITY MODAL -->
<div class="modal-overlay" id="uniModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="uniModalTitle">বিশ্ববিদ্যালয় যোগ করুন</h3><button class="modal-close" id="uniModalClose">&times;</button></div>
    <form id="uniForm">
      <div class="form-group"><label>বিশ্ববিদ্যালয়ের নাম *</label><input type="text" name="name" required></div>
      <div class="form-row">
        <div class="form-group"><label>আবেদন লিংক</label><input type="text" name="applyLink" placeholder="https://..."></div>
        <div class="form-group"><label>লিংক টেক্সট</label><input type="text" name="applyLinkText" placeholder="Apply"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>ডেডলাইন (প্রদর্শিত টেক্সট)</label><input type="text" name="deadline" placeholder="Dec 31, 2026"></div>
        <div class="form-group"><label>ডেডলাইন কাউন্টডাউন</label><input type="text" name="deadlineCountdown" placeholder="DD-MM-YYYY HH:MM"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>প্রবেশপত্র স্ট্যাটাস</label><input type="text" name="admitCard"></div>
        <div class="form-group"><label>পরীক্ষার তারিখ (টেক্সট)</label><input type="text" name="examDate"></div>
      </div>
      <div class="form-group"><label>পরীক্ষা কাউন্টডাউন</label><input type="text" name="examCountdown" placeholder="DD-MM-YYYY HH:MM"></div>
      <div class="form-row">
        <div class="form-group"><label>নেগেটিভ মার্কিং</label><input type="text" name="negative" placeholder="0.25 / নাই"></div>
        <div class="form-group"><label>সার্কুলার লিংক</label><input type="text" name="circularLink"></div>
      </div>
      <div class="form-row">
        <div class="checkbox-row"><input type="checkbox" name="calculator" id="uniCalc"><label for="uniCalc" style="margin:0;">ক্যালকুলেটর সুবিধা আছে</label></div>
        <div class="checkbox-row"><input type="checkbox" name="secondTime" id="uniSecond"><label for="uniSecond" style="margin:0;">সেকেন্ড টাইম সুবিধা আছে</label></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>ফলাফলের তারিখ</label><input type="text" name="resultDate"></div>
        <div class="form-group"><label>ফলাফল লিংক</label><input type="text" name="resultLink"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>আবেদনের জন্য প্রয়োজনীয় সম্মিলিত জিপিএ (SSC+HSC)</label><input type="number" step="0.01" name="requiredGPA" placeholder="যেমনঃ 8.00"></div>
        <div class="checkbox-row" style="margin-top:30px;"><input type="checkbox" name="active" id="uniActive" checked><label for="uniActive" style="margin:0;">সক্রিয় (ওয়েবসাইটে দেখাবে)</label></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="uniSaveBtn">সংরক্ষণ করুন</button>
    </form>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="userModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="userModalTitle">ইউজার প্রোফাইল</h3><button class="modal-close" id="userModalClose">&times;</button></div>
    <form id="userForm">
      <div class="form-group" id="userIdField">
        <label>Firebase UID (নতুন প্রোফাইলের জন্য প্রয়োজন)</label>
        <input type="text" name="uid" placeholder="Firebase Authentication থেকে UID কপি করুন">
      </div>
      <div class="form-row">
        <div class="form-group"><label>নাম</label><input type="text" name="name"></div>
        <div class="form-group"><label>ইউজারনেম</label><input type="text" name="username"></div>
      </div>
      <div class="form-group"><label>ইমেইল</label><input type="email" name="email"></div>
      <div class="form-row">
        <div class="form-group"><label>SSC জিপিএ</label><input type="number" step="0.01" name="sscGPA"></div>
        <div class="form-group"><label>HSC জিপিএ</label><input type="number" step="0.01" name="hscGPA"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>SSC মার্ক</label><input type="number" step="0.01" name="sscMark"></div>
        <div class="form-group"><label>HSC মার্ক</label><input type="number" step="0.01" name="hscMark"></div>
      </div>
      <div class="form-group">
        <label>রোল</label>
        <select name="role"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="userSaveBtn">সংরক্ষণ করুন</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/admin.js"></script>
</body>
</html>
