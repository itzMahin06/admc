<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>রেজিস্টার - Admission Calendar</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="assets/common.css">
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div id="site-header"></div>

<div id="app">
  <div class="auth-wrap">
    <h1 class="page-title" style="text-align:center;">অ্যাকাউন্ট তৈরি করুন 🎓</h1>
    <p class="page-sub" style="text-align:center;">ফুল অ্যাক্সেস ও প্রিমিয়াম ফিচার আনলক করুন — সম্পূর্ণ ফ্রি</p>

    <div class="card">
      <div class="form-msg" id="formMsg"></div>

      <button type="button" class="btn btn-google btn-block" id="googleBtn">
        <i class="fa-brands fa-google"></i> গুগল দিয়ে সাইন আপ করুন
      </button>
      <div class="divider-or">অথবা</div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label>পূর্ণ নাম</label>
          <input type="text" name="name" required placeholder="আপনার নাম">
        </div>
        <div class="form-group">
          <label>ইউজারনেম বেছে নিন</label>
          <input type="text" name="username" required placeholder="username">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>SSC জিপিএ</label>
            <input type="number" step="0.01" min="0" max="5" name="sscGPA" required placeholder="যেমনঃ 5.00">
          </div>
          <div class="form-group">
            <label>HSC জিপিএ</label>
            <input type="number" step="0.01" min="0" max="5" name="hscGPA" required placeholder="যেমনঃ 5.00">
          </div>
        </div>
        <div class="form-group">
          <label>ইমেইল ঠিকানা</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <input type="password" name="password" required placeholder="কমপক্ষে ৬ ক্যারেক্টার">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">রেজিস্টার করুন</button>
      </form>
      <p style="font-size:.72rem;color:var(--text-muted);margin-top:12px;text-align:center;">
        SSC ও HSC এর মোট মার্ক পরে প্রোফাইল থেকে যোগ করতে পারবেন।
      </p>
    </div>

    <p class="auth-switch">অ্যাকাউন্ট আছে? <a href="login.html">সাইন ইন করুন</a></p>
  </div>
</div>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/api/firebase-config.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/auth.js"></script>
</body>
</html>
