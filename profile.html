<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>প্রোফাইল - Admission Calendar</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; animation: fadeUp .6s both; }
    #avatarBig { width: 68px; height: 68px; border-radius: 18px; object-fit: cover; border: 2px solid var(--border-hi); }
    .profile-tabs { display: flex; gap: 8px; margin: 24px 0 16px; flex-wrap: wrap; }
    .profile-tabs button { padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-family: inherit; font-size: .82rem; font-weight: 700; cursor: pointer; }
    .profile-tabs button.active { background: linear-gradient(135deg, var(--primary), #5b21b6); color: #fff; border-color: transparent; }
    .profile-section { display: none; }
    .profile-section.active { display: block; animation: fadeUp .4s both; }
    .uni-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 10px; }
    .uni-name { font-weight: 700; font-size: .9rem; }
    .uni-sub { font-size: .76rem; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div id="site-header"></div>

<div id="app">
  <div class="loading-block" id="profileLoading"><span class="spinner" style="border-top-color:var(--primary-hi);width:26px;height:26px;"></span><p style="margin-top:10px;">লোড হচ্ছে...</p></div>

  <div id="profileContent" style="display:none;">
    <div class="profile-header">
      <img id="avatarBig" src="" alt="avatar">
      <div>
        <h1 class="page-title" style="margin:0;">আমার প্রোফাইল</h1>
        <p class="page-sub" style="margin:2px 0 0;" id="emailDisplay"></p>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="p-tab active" data-target="info">তথ্য</button>
      <button class="p-tab" data-target="bookmarks">বুকমার্ক</button>
      <button class="p-tab" data-target="eligible">যোগ্য বিশ্ববিদ্যালয়</button>
    </div>

    <div class="profile-section active" id="section-info">
      <div class="card">
        <div class="form-msg" id="profileMsg"></div>
        <form id="profileForm" novalidate>
          <div class="form-row">
            <div class="form-group"><label>পূর্ণ নাম</label><input type="text" name="name" required></div>
            <div class="form-group"><label>ইউজারনেম</label><input type="text" name="username" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>SSC জিপিএ</label><input type="number" step="0.01" min="0" max="5" name="sscGPA"></div>
            <div class="form-group"><label>HSC জিপিএ</label><input type="number" step="0.01" min="0" max="5" name="hscGPA"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>SSC মোট মার্ক</label><input type="number" step="0.01" min="0" name="sscMark" placeholder="ঐচ্ছিক"></div>
            <div class="form-group"><label>HSC মোট মার্ক</label><input type="number" step="0.01" min="0" name="hscMark" placeholder="ঐচ্ছিক"></div>
          </div>
          <button type="submit" class="btn btn-primary" id="saveBtn">পরিবর্তন সংরক্ষণ করুন</button>
        </form>
      </div>
    </div>

    <div class="profile-section" id="section-bookmarks">
      <p class="section-label"><i class="fa-solid fa-bookmark"></i> আমার বুকমার্কসমূহ</p>
      <div id="bookmarkList"></div>
    </div>

    <div class="profile-section" id="section-eligible">
      <div class="alert info" id="gpaSummary"><i class="fa-solid fa-calculator"></i> জিপিএ যোগ করুন</div>
      <div id="eligibleList"></div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/api/firebase-config.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/profile.js"></script>
<script>
  document.querySelectorAll('.p-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.profile-section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('section-' + btn.dataset.target).classList.add('active');
    });
  });
  if (location.hash === '#bookmarks') {
    document.querySelector('.p-tab[data-target="bookmarks"]')?.click();
  }
</script>
</body>
</html>
